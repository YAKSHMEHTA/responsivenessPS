<!DOCTYPE html>
<html>
<head>
  <title>Foodie's Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <h1 class="logo">Foodie's Hub</h1>
    <ul class="menu">
      <li>Home</li>
      <li>Menu</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
  </div>

  <div class="hero">
    <div class="hero-text">
      <h2>Delicious Food Delivered</h2>
      <p>Fresh meals at your doorstep.</p>
      <button>Order Now</button>
    </div>

    <div class="hero-img">
      <img src="https://picsum.photos/500/400" />
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Pizza</h3>
      <p>Cheesy and hot.</p>
    </div>
    <div class="card">
      <h3>Burger</h3>
      <p>Juicy and fresh.</p>
    </div>
    <div class="card">
      <h3>Pasta</h3>
      <p>Italian taste.</p>
    </div>
  </div>

</body>
</html>
